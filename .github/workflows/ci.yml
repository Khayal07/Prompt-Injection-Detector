name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app eval data tests

      - name: Run tests
        # Tests use SQLite and a disabled classifier, so no Postgres or network is needed.
        env:
          CLASSIFIER_ENABLED: "false"
        run: pytest -q
